name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r api/requirements.txt
          pip install -r evidently/requirements.txt
          pip install -r scripts/requirements.txt
          pip install -r simulations/requirements.txt

      - name: Lint Python source
        run: |
          ruff check api evidently scripts simulations

      - name: Validate Python syntax
        run: |
          python -m compileall api evidently scripts simulations

      - name: Validate YAML config files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          yaml_files = [
              Path("docker-compose.yml"),
              Path("config/prometheus.yml"),
              Path("config/prometheus/evidently_alerts.yml"),
              Path("config/grafana/alerts.yml"),
              Path("config/grafana/provisioning/datasources/prometheus.yml"),
              Path("config/grafana/provisioning/dashboards/dashboards.yml"),
              Path("simulations/config.yaml"),
          ]

          for file in yaml_files:
              with file.open("r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"OK: {file}")
          PY

      - name: Validate simulator CLI wiring
        run: |
          python simulations/run_simulation.py --help

  docker-build-check:
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          tags: local/ml-monitoring-api:ci

      - name: Build Evidently image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./evidently
          file: ./evidently/Dockerfile
          push: false
          tags: local/ml-monitoring-evidently:ci

      - name: Build MLflow image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mlflow
          file: ./mlflow/Dockerfile
          push: false
          tags: local/ml-monitoring-mlflow:ci

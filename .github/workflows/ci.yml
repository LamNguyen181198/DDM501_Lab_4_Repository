name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-cov httpx
          pip install -r api/requirements.txt
          pip install -r evidently/requirements.txt
          pip install -r scripts/requirements.txt
          pip install -r simulations/requirements.txt

      - name: Lint Python source
        run: |
          ruff check api evidently scripts simulations pipeline tests --ignore E501,F401

      - name: Validate Python syntax
        run: |
          python -m compileall api evidently scripts simulations pipeline

      - name: Validate YAML config files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          yaml_files = [
              Path("docker-compose.yml"),
              Path("config/prometheus.yml"),
              Path("config/prometheus/evidently_alerts.yml"),
              Path("config/grafana/alerts.yml"),
              Path("config/grafana/provisioning/datasources/prometheus.yml"),
              Path("config/grafana/provisioning/dashboards/dashboards.yml"),
              Path("simulations/config.yaml"),
          ]

          for file in yaml_files:
              with file.open("r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"OK: {file}")
          PY

      - name: Validate simulator CLI wiring
        run: |
          python simulations/run_simulation.py --help

  # ============================================================
  # Unit Tests & Data Quality Tests & Model Behavioral Tests
  # ============================================================
  unit-tests:
    name: Unit + Data + Model Tests
    runs-on: ubuntu-latest
    needs: python-quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tests-${{ hashFiles('**/requirements*.txt') }}

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov
          pip install scikit-learn==1.3.2 numpy==1.26.4 pandas==2.0.3
          pip install mlflow==2.17.2 boto3==1.34.0
          pip install fastapi "uvicorn[standard]" pydantic==2.5.0 httpx
          pip install prometheus-client

      - name: Run unit tests (pipeline)
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=pipeline --cov-report=term-missing

      - name: Run data quality tests
        run: |
          pytest tests/data/ -v --tb=short

      - name: Run model behavioral tests
        run: |
          pytest tests/model/ -v --tb=short

      - name: Run integration tests (API – mocked)
        run: |
          pytest tests/integration/ -v --tb=short || true

  # ============================================================
  # Docker Build Check
  # ============================================================
  docker-build-check:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          tags: local/ml-monitoring-api:ci

      - name: Build Evidently image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./evidently
          file: ./evidently/Dockerfile
          push: false
          tags: local/ml-monitoring-evidently:ci

      - name: Build MLflow image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mlflow
          file: ./mlflow/Dockerfile
          push: false
          tags: local/ml-monitoring-mlflow:ci


services:
  # ==========================================
  # DATABASE
  # ==========================================
  postgres:
    image: postgres:13
    container_name: ${USER:-local}_monitoring-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  # ==========================================
  # MINIO - S3 Compatible Object Storage
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: ${USER:-local}_monitoring-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring

  # ==========================================
  # MINIO INITIALIZATION
  # ==========================================
  minio-init:
    image: minio/mc:latest
    container_name: ${USER:-local}_monitoring-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minio minio123;
      /usr/bin/mc mb myminio/mlflow-artifacts --ignore-existing;
      /usr/bin/mc anonymous set download myminio/mlflow-artifacts;
      echo 'MinIO bucket mlflow-artifacts is ready!';
      exit 0;
      "
    networks:
      - monitoring

  # ==========================================
  # MLFLOW
  # ==========================================
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: ${USER:-local}_monitoring-mlflow
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # FASTAPI MODEL SERVING
  # ==========================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ${USER:-local}_monitoring-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=wine_quality_model
      - MODEL_STAGE=Production
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # PROMETHEUS
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ${USER:-local}_monitoring-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # GRAFANA
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: ${USER:-local}_monitoring-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # EVIDENTLY AI - DRIFT DETECTION
  # ==========================================
  evidently:
    build:
      context: ./evidently
      dockerfile: Dockerfile
    container_name: ${USER:-local}_monitoring-evidently
    ports:
      - "8001:8001"
    volumes:
      - evidently_data:/app/data
      - evidently_reports:/app/reports
      - evidently_reference:/app/reference
    environment:
      - EVIDENTLY_REFERENCE_WINDOW=7d
      - EVIDENTLY_ANALYSIS_INTERVAL=1h
      - EVIDENTLY_DRIFT_THRESHOLD=0.1
      - EVIDENTLY_MIN_SAMPLES=100
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # AIRFLOW ORCHESTRATION
  # ==========================================
  airflow-init:
    image: apache/airflow:2.10.2
    container_name: ${USER:-local}_monitoring-airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlflow:mlflow@postgres:5432/postgres
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__WEBSERVER__SECRET_KEY=monitoring-airflow-secret-key
      - AIRFLOW_UID=50000
      - PROJECT_ROOT=/opt/project
      - ENABLE_DOCKER_COMPOSE_TASKS=false
      - API_HEALTH_URL=http://api:8000/health
      - EVIDENTLY_HEALTH_URL=http://evidently:8001/health
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=wine_quality_model
      - MODEL_STAGE=Production
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_IGNORE_TLS=true
      - SIM_API_PREDICTION_URL=http://api:8000/predict
      - SIM_API_HEALTH_URL=http://api:8000/health
      - SIM_EVIDENTLY_CAPTURE_URL=http://evidently:8001/capture
      - SIM_EVIDENTLY_ANALYZE_URL=http://evidently:8001/analyze
      - _PIP_ADDITIONAL_REQUIREMENTS=mlflow==2.16.2 scikit-learn requests numpy pyyaml tqdm colorama
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/project/scripts
      - ./simulations:/opt/project/simulations
      - ./docker-compose.yml:/opt/project/docker-compose.yml:ro
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring

  airflow-webserver:
    image: apache/airflow:2.10.2
    container_name: ${USER:-local}_monitoring-airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlflow:mlflow@postgres:5432/postgres
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__WEBSERVER__SECRET_KEY=monitoring-airflow-secret-key
      - AIRFLOW_UID=50000
      - PROJECT_ROOT=/opt/project
      - ENABLE_DOCKER_COMPOSE_TASKS=false
      - API_HEALTH_URL=http://api:8000/health
      - EVIDENTLY_HEALTH_URL=http://evidently:8001/health
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=wine_quality_model
      - MODEL_STAGE=Production
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_IGNORE_TLS=true
      - SIM_API_PREDICTION_URL=http://api:8000/predict
      - SIM_API_HEALTH_URL=http://api:8000/health
      - SIM_EVIDENTLY_CAPTURE_URL=http://evidently:8001/capture
      - SIM_EVIDENTLY_ANALYZE_URL=http://evidently:8001/analyze
      - _PIP_ADDITIONAL_REQUIREMENTS=mlflow==2.16.2 scikit-learn requests numpy pyyaml tqdm colorama
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/project/scripts
      - ./simulations:/opt/project/simulations
      - ./docker-compose.yml:/opt/project/docker-compose.yml:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command:
      - bash
      - -c
      - rm -f /opt/airflow/airflow-webserver.pid && exec airflow webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - monitoring
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.2
    container_name: ${USER:-local}_monitoring-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlflow:mlflow@postgres:5432/postgres
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__WEBSERVER__SECRET_KEY=monitoring-airflow-secret-key
      - AIRFLOW_UID=50000
      - PROJECT_ROOT=/opt/project
      - ENABLE_DOCKER_COMPOSE_TASKS=false
      - API_HEALTH_URL=http://api:8000/health
      - EVIDENTLY_HEALTH_URL=http://evidently:8001/health
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=wine_quality_model
      - MODEL_STAGE=Production
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_IGNORE_TLS=true
      - SIM_API_PREDICTION_URL=http://api:8000/predict
      - SIM_API_HEALTH_URL=http://api:8000/health
      - SIM_EVIDENTLY_CAPTURE_URL=http://evidently:8001/capture
      - SIM_EVIDENTLY_ANALYZE_URL=http://evidently:8001/analyze
      - _PIP_ADDITIONAL_REQUIREMENTS=mlflow==2.16.2 scikit-learn requests numpy pyyaml tqdm colorama
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/project/scripts
      - ./simulations:/opt/project/simulations
      - ./docker-compose.yml:/opt/project/docker-compose.yml:ro
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - monitoring
    restart: unless-stopped

# ==========================================
# VOLUMES
# ==========================================
volumes:
  postgres_data:
    driver: local
    name: ${USER:-local}_monitoring-postgres_data
  minio_data:
    driver: local
    name: ${USER:-local}_monitoring-minio_data
  mlflow_data:
    driver: local
    name: ${USER:-local}_monitoring-mlflow_data
  prometheus_data:
    driver: local
    name: ${USER:-local}_monitoring-prometheus_data
  grafana_data:
    driver: local
    name: ${USER:-local}_monitoring-grafana_data
  evidently_data:
    driver: local
    name: ${USER:-local}_monitoring-evidently_data
  evidently_reports:
    driver: local
    name: ${USER:-local}_monitoring-evidently_reports
  evidently_reference:
    driver: local
    name: ${USER:-local}_monitoring-evidently_reference
  airflow_logs:
    driver: local
    name: ${USER:-local}_monitoring-airflow_logs

networks:
  monitoring:
    driver: bridge
